<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>命运回响 · 网页离线版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>命运回响</h1>
        <p>现实人生模拟 · 自我觉察 · 网页离线版</p>
      </div>
      <nav>
        <button id="homeBtn" class="ghost">首页</button>
        <button id="archiveBtn" class="ghost">档案</button>
        <button id="guideBtn" class="ghost">说明</button>
      </nav>
    </header>

    <section id="homeView" class="view">
      <div class="hero">
        <h2>从小学午后的窗边，到成年后的某个深夜。</h2>
        <p>你会在一连串现实节点里做选择。系统不会告诉你什么才是正确人生，只会记录你如何保护自己、如何靠近关系、如何面对失控和疲惫。</p>
        <div class="actions">
          <button id="startBtn" class="primary">开始新的人生</button>
          <button id="continueBtn">继续上次进度</button>
        </div>
      </div>
      <div class="notice">
        <strong>使用边界</strong>
        <span>这是互动叙事和自我觉察工具，不提供心理诊断，也不能替代心理咨询或危机干预。</span>
      </div>
    </section>

    <section id="gameView" class="view hidden">
      <div class="game-grid">
        <article class="panel story-panel">
          <div class="chapter-label" id="chapterLabel"></div>
          <h2 id="nodeTitle"></h2>
          <p id="nodeScene" class="scene"></p>
          <div id="nodeAnchor" class="anchor"></div>
          <div id="previousMirror" class="mirror hidden"></div>
          <h3>你会怎么选？</h3>
          <div id="choices" class="choices"></div>
        </article>
        <aside class="side">
          <section class="panel">
            <h3>当前资源</h3>
            <div id="resources"></div>
          </section>
          <section class="panel">
            <h3>需求趋势</h3>
            <div id="needs"></div>
          </section>
          <section class="panel">
            <h3>剧情路径</h3>
            <div id="storyMap" class="story-map"></div>
          </section>
        </aside>
      </div>
    </section>

    <section id="reportView" class="view hidden">
      <article class="panel report">
        <div class="chapter-label">终局报告</div>
        <h2 id="endingTitle"></h2>
        <p id="endingSummary"></p>
        <p id="interpretation"></p>
        <div class="report-grid">
          <div>
            <h3>显著需求</h3>
            <p id="topNeeds"></p>
          </div>
          <div>
            <h3>受伤线索</h3>
            <p id="topWounds"></p>
          </div>
        </div>
        <h3>决策风格摘要</h3>
        <ul id="styleSummary"></ul>
        <h3>解锁成就</h3>
        <ul id="achievementList"></ul>
        <div class="actions">
          <button id="restartBtn" class="primary">再开一局</button>
          <button id="saveArchiveBtn">保存到档案</button>
        </div>
      </article>
    </section>

    <section id="archiveView" class="view hidden">
      <article class="panel">
        <h2>档案</h2>
        <div id="archiveList"></div>
        <div class="actions">
          <button id="clearArchiveBtn">清空档案</button>
        </div>
      </article>
    </section>

    <section id="guideView" class="view hidden">
      <article class="panel">
        <h2>产品说明</h2>
        <div id="guideContent"></div>
      </article>
    </section>
  </main>

  <script src="story-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
